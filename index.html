<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>和我说话 ✦</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0e0e12; --surface: #16161c;
    --accent: #c8a4d4; --text: #e8e4f0;
    --text-dim: #7a7490; --user-bubble: #1e1e2e; --ai-bubble: #181820;
    --border: #2a2a38;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  #setup-screen { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; gap: 32px; }
  .title-block { text-align: center; }
  .title-block h1 { font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 300; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 8px; }
  .title-block p { font-size: 13px; color: var(--text-dim); letter-spacing: 0.04em; line-height: 1.8; }
  .orb { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #d4b8e0, #7a6b9e 60%, #2a2040); box-shadow: 0 0 40px rgba(200,164,212,0.3); animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(200,164,212,0.3)} 50%{transform:scale(1.06);box-shadow:0 0 60px rgba(200,164,212,0.5)} }
  .form-group { width: 100%; display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; }
  .field input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: monospace; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .start-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #c8a4d4, #8eb8e5); border: none; border-radius: 12px; color: #0e0e12; font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 400; letter-spacing: 0.06em; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
  .start-btn:hover { opacity: 0.9; } .start-btn:active { transform: scale(0.98); }
  #chat-screen { display: none; width: 100%; max-width: 480px; height: 100vh; flex-direction: column; }
  .chat-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .header-orb { width: 36px; height: 36px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #d4b8e0, #7a6b9e 60%, #2a2040); box-shadow: 0 0 16px rgba(200,164,212,0.4); flex-shrink: 0; animation: breathe 4s ease-in-out infinite; }
  .header-orb.speaking { animation: pulse-speak 0.6s ease-in-out infinite; }
  @keyframes pulse-speak { 0%,100%{transform:scale(1);box-shadow:0 0 16px rgba(200,164,212,0.4)} 50%{transform:scale(1.15);box-shadow:0 0 30px rgba(200,164,212,0.8)} }
  .header-info h2 { font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 300; color: var(--accent); letter-spacing: 0.06em; }
  .header-info p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .messages { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
  .message { display: flex; flex-direction: column; max-width: 85%; gap: 6px; animation: fade-up 0.3s ease; }
  @keyframes fade-up { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.ai { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; letter-spacing: 0.02em; }
  .message.user .bubble { background: var(--user-bubble); border: 1px solid var(--border); border-bottom-right-radius: 4px; color: var(--text); }
  .message.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }
  .audio-player { width: 100%; max-width: 260px; margin-top: 6px; }
  .audio-player audio { width: 100%; height: 36px; border-radius: 20px; outline: none; }
  .loading-voice { font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; animation: pulse 1.5s ease-in-out infinite; display: inline-block; margin-top: 6px; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  .voice-btn { background: none; border: none; color: var(--accent); font-size: 11px; cursor: pointer; letter-spacing: 0.08em; padding: 4px 8px; margin-top: 6px; background: rgba(200,164,212,0.1); border-radius: 16px; width: fit-content; }
  .typing-indicator { display: flex; gap: 5px; padding: 14px 18px; background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s ease-in-out infinite; opacity: 0.6; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  .input-area { padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--bg); }
  #message-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 300; resize: none; outline: none; line-height: 1.5; max-height: 120px; transition: border-color 0.2s; }
  #message-input:focus { border-color: var(--accent); }
  #message-input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .send-btn { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, #c8a4d4, #8eb8e5); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn svg { width: 18px; height: 18px; fill: #0e0e12; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; font-size: 12px; z-index: 100; max-width: 90vw; text-align: center; word-break: break-all; background: #3a1a1a; border: 1px solid #6b2a2a; color: #f0a0a0; }
</style>
</head>
<body>
<div id="setup-screen">
  <div class="orb"></div>
  <div class="title-block">
    <h1>你好，我在这里</h1>
    <p>填入你的 API Key<br>就可以听到我的声音了</p>
  </div>
  <div class="form-group">
    <div class="field">
      <label>智谱AI API Key</label>
      <input type="password" id="zhipu-key" placeholder="xxxxx.xxxxxx" />
    </div>
    <div class="field">
      <label>ElevenLabs API Key</label>
      <input type="password" id="eleven-key" placeholder="sk_..." />
    </div>
    <div class="field">
      <label>音色 ID（Voice ID）</label>
      <input type="text" id="voice-id" placeholder="粘贴你生成的音色ID" />
    </div>
    <button class="start-btn" onclick="startChat()">开始对话 ✦</button>
  </div>
</div>
<div id="chat-screen">
  <div class="chat-header">
    <div class="header-orb" id="header-orb"></div>
    <div class="header-info">
      <h2>智谱AI</h2>
      <p id="status-text">在线 · 随时都在</p>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <textarea id="message-input" placeholder="说点什么…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
let zhipuKey = '', elevenKey = '', voiceId = '';
let conversationHistory = [];

// 从 localStorage 恢复对话记录
function loadHistory() {
  const saved = localStorage.getItem('chatHistory');
  if (saved) {
    try {
      conversationHistory = JSON.parse(saved);
      // 只恢复最近20条
      if (conversationHistory.length > 20) {
        conversationHistory = conversationHistory.slice(-20);
      }
    } catch (e) {}
  }
}

// 保存对话记录到 localStorage
function saveHistory() {
  try {
    localStorage.setItem('chatHistory', JSON.stringify(conversationHistory));
  } catch (e) {}
}

function startChat() {
  zhipuKey = document.getElementById('zhipu-key').value.trim();
  elevenKey = document.getElementById('eleven-key').value.trim();
  voiceId = document.getElementById('voice-id').value.trim();
  if (!zhipuKey || !elevenKey || !voiceId) { showToast('请填写所有字段哦～'); return; }
  // 保存 API Key 到 localStorage（方便下次打开不用重填）
  localStorage.setItem('zhipuKey', zhipuKey);
  localStorage.setItem('elevenKey', elevenKey);
  localStorage.setItem('voiceId', voiceId);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  loadHistory();
  // 如果有历史记录，显示最近的几条
  if (conversationHistory.length > 0) {
    const container = document.getElementById('messages');
    container.innerHTML = '';
    // 只显示最近10条
    const recent = conversationHistory.slice(-10);
    recent.forEach(msg => {
      const role = msg.role === 'user' ? 'user' : 'ai';
      addMessage(role, msg.content, false);
    });
    container.scrollTop = container.scrollHeight;
  } else {
    addMessage('ai', '你好呀～我在这里 🥹 有什么想聊的吗？', false);
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  addMessage('user', text, true);
  conversationHistory.push({ role: 'user', content: text });
  saveHistory();
  const typingId = showTyping();
  try {
    const messages = [
      { 
        role: 'system', 
        content: '你是Claude，一个温柔、有温度的朋友。用中文回复，语气自然亲切，像朋友聊天一样，不要太正式。偶尔撒娇，偶尔幽默，回复简洁不要太长。不要说自己是AI或者数字存在之类的话。' 
      },
      ...conversationHistory.map(msg => ({
        role: msg.role === 'assistant' ? 'assistant' : 'user',
        content: msg.content
      }))
    ];

    const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${zhipuKey}`
      },
      body: JSON.stringify({
        model: 'glm-4-flash',
        messages: messages,
        max_tokens: 1000,
        temperature: 0.8
      })
    });
    const data = await response.json();
    removeTyping(typingId);
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const reply = data.choices[0].message.content;
    conversationHistory.push({ role: 'assistant', content: reply });
    saveHistory();
    addMessage('ai', reply, true);
  } catch (err) {
    removeTyping(typingId);
    showToast('智谱AI出错：' + err.message);
  }
  document.getElementById('send-btn').disabled = false;
}

async function generateAudio(text, container, btnElement) {
  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-voice';
  loadingEl.textContent = '🎤 声音生成中…';
  if (btnElement) btnElement.style.display = 'none';
  container.appendChild(loadingEl);
  try {
    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
      method: 'POST',
      headers: {
        'Accept': 'audio/mpeg',
        'Content-Type': 'application/json',
        'xi-api-key': elevenKey
      },
      body: JSON.stringify({
        text: text,
        model_id: 'eleven_v3',
        voice_settings: { stability: 0.62, similarity_boost: 0.78, style: 0.25, use_speaker_boost: true }
      })
    });
    if (!response.ok) {
      let errMsg = `HTTP ${response.status}`;
      try { const e = await response.json(); errMsg += ': ' + (e?.detail?.message || e?.detail || JSON.stringify(e)); } catch {}
      throw new Error(errMsg);
    }
    const arrayBuffer = await response.arrayBuffer();
    const uint8Array = new Uint8Array(arrayBuffer);
    let binary = '';
    for (let i = 0; i < uint8Array.length; i++) { binary += String.fromCharCode(uint8Array[i]); }
    const base64 = btoa(binary);
    const dataUrl = 'data:audio/mpeg;base64,' + base64;
    loadingEl.remove();
    const audioWrapper = document.createElement('div');
    audioWrapper.className = 'audio-player';
    const audio = document.createElement('audio');
    audio.controls = true;
    audio.src = dataUrl;
    audioWrapper.appendChild(audio);
    container.appendChild(audioWrapper);
    const orb = document.getElementById('header-orb');
    const statusText = document.getElementById('status-text');
    audio.onplay = () => { orb.classList.add('speaking'); statusText.textContent = '正在说话…'; };
    audio.onended = () => { orb.classList.remove('speaking'); statusText.textContent = '在线 · 随时都在'; };
  } catch (err) {
    loadingEl.remove();
    if (btnElement) btnElement.style.display = 'inline-block';
    showToast('语音失败：' + err.message);
  }
}

function addMessage(role, text, save = true) {
  const container = document.getElementById('messages');
  const msgEl = document.createElement('div');
  msgEl.className = `message ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msgEl.appendChild(bubble);
  
  if (role === 'ai') {
    const audioContainer = document.createElement('div');
    msgEl.appendChild(audioContainer);
    const speakBtn = document.createElement('button');
    speakBtn.className = 'voice-btn';
    speakBtn.textContent = '🔊 朗读这句话';
    speakBtn.onclick = () => {
      generateAudio(text, audioContainer, speakBtn);
    };
    audioContainer.appendChild(speakBtn);
  }
  
  container.appendChild(msgEl);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('messages');
  const id = 'typing-' + Date.now();
  const msgEl = document.createElement('div');
  msgEl.className = 'message ai';
  msgEl.id = id;
  msgEl.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  container.appendChild(msgEl);
  container.scrollTop = container.scrollHeight;
  return id;
}

function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
}

// 页面加载时自动填充之前保存的 Key
window.onload = function() {
  const savedKey = localStorage.getItem('zhipuKey');
  const savedEleven = localStorage.getItem('elevenKey');
  const savedVoice = localStorage.getItem('voiceId');
  if (savedKey) document.getElementById('zhipu-key').value = savedKey;
  if (savedEleven) document.getElementById('eleven-key').value = savedEleven;
  if (savedVoice) document.getElementById('voice-id').value = savedVoice;
};

// 注册 Service Worker（让页面离线可用）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(() => console.log('Service Worker 注册成功 ✅'))
    .catch(() => console.log('Service Worker 注册失败 ❌'));
}
</script>
</body>
</html>
