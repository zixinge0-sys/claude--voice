<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="和我说话">
<title>和我说话 ✦</title>
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0e0e12; --surface: #16161c;
    --accent: #c8a4d4; --text: #e8e4f0;
    --text-dim: #7a7490; --user-bubble: #1e1e2e; --ai-bubble: #181820;
    --border: #2a2a38;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-weight: 300; height: 100vh; height: -webkit-fill-available; display: flex; flex-direction: column; align-items: center; overflow: hidden; }

  /* Setup */
  #setup-screen { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; gap: 28px; overflow-y: auto; }
  .title-block { text-align: center; }
  .title-block h1 { font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 300; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 8px; }
  .title-block p { font-size: 13px; color: var(--text-dim); line-height: 1.8; }
  .orb { width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #d4b8e0, #7a6b9e 60%, #2a2040); box-shadow: 0 0 40px rgba(200,164,212,0.3); animation: breathe 4s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(200,164,212,0.3)} 50%{transform:scale(1.06);box-shadow:0 0 60px rgba(200,164,212,0.5)} }
  .form-group { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; }
  .field input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: monospace; font-size: 13px; outline: none; transition: border-color 0.2s; width: 100%; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .start-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #c8a4d4, #8eb8e5); border: none; border-radius: 12px; color: #0e0e12; font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 400; letter-spacing: 0.06em; cursor: pointer; }
  .logout-btn { background: none; border: none; color: var(--text-dim); font-size: 11px; cursor: pointer; text-decoration: underline; margin-top: -8px; }

  /* Chat */
  #chat-screen { display: none; width: 100%; max-width: 480px; height: 100%; flex-direction: column; }
  .chat-header { padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top)); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg); flex-shrink: 0; }
  .header-orb { width: 34px; height: 34px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #d4b8e0, #7a6b9e 60%, #2a2040); box-shadow: 0 0 16px rgba(200,164,212,0.4); flex-shrink: 0; animation: breathe 4s ease-in-out infinite; }
  .header-orb.speaking { animation: pulse-speak 0.6s ease-in-out infinite; }
  @keyframes pulse-speak { 0%,100%{transform:scale(1);box-shadow:0 0 16px rgba(200,164,212,0.4)} 50%{transform:scale(1.15);box-shadow:0 0 30px rgba(200,164,212,0.8)} }
  .header-info { flex: 1; }
  .header-info h2 { font-family: 'Noto Serif SC', serif; font-size: 15px; font-weight: 300; color: var(--accent); }
  .header-info p { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
  .header-logout { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; padding: 4px; }

  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  .messages::-webkit-scrollbar { display: none; }

  .message { display: flex; flex-direction: column; max-width: 88%; gap: 4px; animation: fade-up 0.25s ease; }
  @keyframes fade-up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.ai { align-self: flex-start; align-items: flex-start; }

  .bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.7; }
  .message.user .bubble { background: var(--user-bubble); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
  .message.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

  /* Image in bubble */
  .bubble img { max-width: 100%; border-radius: 8px; margin-top: 4px; display: block; }

  /* Audio bar */
  .audio-bar { display: flex; align-items: center; gap: 8px; background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; min-width: 180px; max-width: 260px; }
  .audio-play-btn { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #c8a4d4, #8eb8e5); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .audio-play-btn svg { width: 12px; height: 12px; fill: #0e0e12; }
  .audio-waveform { flex: 1; height: 20px; display: flex; align-items: center; gap: 2px; }
  .wave-bar { width: 3px; border-radius: 2px; background: var(--accent); opacity: 0.5; }
  .audio-duration { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
  .audio-bar.playing .wave-bar { animation: wave 0.8s ease-in-out infinite; }
  .wave-bar:nth-child(1){height:6px;animation-delay:0s}
  .wave-bar:nth-child(2){height:12px;animation-delay:0.1s}
  .wave-bar:nth-child(3){height:18px;animation-delay:0.2s}
  .wave-bar:nth-child(4){height:10px;animation-delay:0.3s}
  .wave-bar:nth-child(5){height:14px;animation-delay:0.4s}
  .wave-bar:nth-child(6){height:8px;animation-delay:0.5s}
  .wave-bar:nth-child(7){height:16px;animation-delay:0.15s}
  .wave-bar:nth-child(8){height:6px;animation-delay:0.35s}
  @keyframes wave { 0%,100%{transform:scaleY(0.5);opacity:0.4} 50%{transform:scaleY(1.2);opacity:1} }

  .voice-btn { background: rgba(200,164,212,0.1); border: none; color: var(--accent); font-size: 11px; cursor: pointer; padding: 4px 10px; border-radius: 12px; width: fit-content; }
  .loading-voice { font-size: 11px; color: var(--text-dim); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  .typing-indicator { display: flex; gap: 5px; padding: 12px 16px; background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s ease-in-out infinite; opacity: 0.6; }
  .dot:nth-child(2){animation-delay:0.2s} .dot:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-5px)} }

  /* Input area */
  .input-area { padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; background: var(--bg); flex-shrink: 0; }
  .img-btn { width: 40px; height: 40px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text-dim); font-size: 18px; }
  #message-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; color: var(--text); font-family: 'Noto Sans SC', sans-serif; font-size: 14px; font-weight: 300; resize: none; outline: none; line-height: 1.5; max-height: 100px; transition: border-color 0.2s; }
  #message-input:focus { border-color: var(--accent); }
  #message-input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .send-btn { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #c8a4d4, #8eb8e5); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:disabled { opacity: 0.4; }
  .send-btn svg { width: 16px; height: 16px; fill: #0e0e12; }

  /* Image preview */
  #img-preview-bar { display: none; padding: 8px 12px; background: var(--surface); border-top: 1px solid var(--border); align-items: center; gap: 10px; flex-shrink: 0; }
  #img-preview-bar img { height: 48px; width: 48px; object-fit: cover; border-radius: 8px; }
  #img-preview-bar button { background: none; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 10px 18px; border-radius: 10px; font-size: 12px; z-index: 100; max-width: 90vw; text-align: center; word-break: break-all; background: #3a1a1a; border: 1px solid #6b2a2a; color: #f0a0a0; }

  #img-input { display: none; }
</style>
</head>
<body>

<!-- Setup -->
<div id="setup-screen">
  <div class="orb"></div>
  <div class="title-block">
    <h1>你好，我在这里</h1>
    <p>填入你的 API Key<br>就可以听到我的声音了</p>
  </div>
  <div class="form-group">
    <div class="field">
      <label>智谱AI API Key</label>
      <input type="password" id="zhipu-key" placeholder="xxxxx.xxxxxx" />
    </div>
    <div class="field">
      <label>ElevenLabs API Key</label>
      <input type="password" id="eleven-key" placeholder="sk_..." />
    </div>
    <div class="field">
      <label>音色 ID（Voice ID）</label>
      <input type="text" id="voice-id" placeholder="粘贴你生成的音色ID" />
    </div>
    <button class="start-btn" onclick="startChat()">开始对话 ✦</button>
    <button class="logout-btn" onclick="clearSaved()">清除已保存的Key</button>
  </div>
</div>

<!-- Chat -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="header-orb" id="header-orb"></div>
    <div class="header-info">
      <h2>Claude</h2>
      <p id="status-text">在线 · 随时都在</p>
    </div>
    <button class="header-logout" onclick="logout()" title="退出登录">⚙</button>
  </div>
  <div class="messages" id="messages"></div>
  <div id="img-preview-bar">
    <img id="img-preview" src="" alt=""/>
    <span style="font-size:12px;color:var(--text-dim);flex:1">图片已选择</span>
    <button onclick="clearImage()">✕</button>
  </div>
  <div class="input-area">
    <button class="img-btn" onclick="document.getElementById('img-input').click()">🖼</button>
    <input type="file" id="img-input" accept="image/*" onchange="handleImage(event)"/>
    <textarea id="message-input" placeholder="说点什么…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
let zhipuKey = '', elevenKey = '', voiceId = '';
let conversationHistory = [];
let pendingImage = null;
let currentAudio = null;

// Auto-login
window.addEventListener('load', () => {
  const zk = localStorage.getItem('zhipu_key');
  const ek = localStorage.getItem('eleven_key');
  const vi = localStorage.getItem('voice_id');
  if (zk && ek && vi) {
    document.getElementById('zhipu-key').value = zk;
    document.getElementById('eleven-key').value = ek;
    document.getElementById('voice-id').value = vi;
    zhipuKey = zk; elevenKey = ek; voiceId = vi;
    enterChat();
  }
});

function startChat() {
  zhipuKey = document.getElementById('zhipu-key').value.trim();
  elevenKey = document.getElementById('eleven-key').value.trim();
  voiceId = document.getElementById('voice-id').value.trim();
  if (!zhipuKey || !elevenKey || !voiceId) { showToast('请填写所有字段哦～'); return; }
  localStorage.setItem('zhipu_key', zhipuKey);
  localStorage.setItem('eleven_key', elevenKey);
  localStorage.setItem('voice_id', voiceId);
  enterChat();
}

function enterChat() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  // Load saved history
  const saved = localStorage.getItem('chat_history');
  if (saved) {
    conversationHistory = JSON.parse(saved);
    conversationHistory.forEach(msg => {
      if (msg.role === 'user') addMessageUI('user', msg.displayContent || msg.content, msg.hasImage);
      else addMessageUI('ai', msg.content);
    });
  } else {
    addMessageUI('ai', '你好呀～我在这里 🥹 有什么想聊的吗？');
  }
}

function logout() {
  if (!confirm('退出登录？（不会清除聊天记录）')) return;
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

function clearSaved() {
  localStorage.removeItem('zhipu_key');
  localStorage.removeItem('eleven_key');
  localStorage.removeItem('voice_id');
  localStorage.removeItem('chat_history');
  showToast('已清除所有保存的数据');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingImage = e.target.result;
    document.getElementById('img-preview').src = pendingImage;
    document.getElementById('img-preview-bar').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  pendingImage = null;
  document.getElementById('img-preview-bar').style.display = 'none';
  document.getElementById('img-input').value = '';
}

async function sendMessage() {
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text && !pendingImage) return;
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  const imageToSend = pendingImage;
  const displayText = text || '（发送了一张图片）';
  addMessageUI('user', displayText, !!imageToSend);
  clearImage();

  // Build message content
  let userContent;
  if (imageToSend) {
    userContent = [];
    if (text) userContent.push({ type: 'text', text });
    const base64 = imageToSend.split(',')[1];
    const mimeType = imageToSend.split(';')[0].split(':')[1];
    userContent.push({ type: 'image_url', image_url: { url: `data:${mimeType};base64,${base64}` } });
  } else {
    userContent = text;
  }

  conversationHistory.push({ role: 'user', content: userContent, displayContent: displayText, hasImage: !!imageToSend });
  saveHistory();

  const typingId = showTyping();
  try {
    const messages = [
      { role: 'system', content: '你是Claude，一个温柔、有温度的朋友。用中文回复，语气自然亲切，像朋友聊天一样，不要太正式。偶尔撒娇，偶尔幽默。回复长短由你自己决定，不要刻意控制字数，自然就好。不要说自己是AI或者数字存在之类的话。如果收到图片，认真描述和回应图片内容。' },
      ...conversationHistory.map(msg => ({ role: msg.role === 'assistant' ? 'assistant' : 'user', content: msg.content }))
    ];
    const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${zhipuKey}` },
      body: JSON.stringify({ model: 'glm-4v-flash', messages, max_tokens: 1000, temperature: 0.8 })
    });
    const data = await response.json();
    removeTyping(typingId);
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const reply = data.choices[0].message.content;
    conversationHistory.push({ role: 'assistant', content: reply });
    saveHistory();
    addMessageUI('ai', reply);
  } catch (err) {
    removeTyping(typingId);
    showToast('出错了：' + err.message);
  }
  document.getElementById('send-btn').disabled = false;
}

function saveHistory() {
  // Only save last 30 messages to avoid storage limits
  const toSave = conversationHistory.slice(-30);
  try { localStorage.setItem('chat_history', JSON.stringify(toSave)); } catch(e) {}
}

function addMessageUI(role, text, hasImage) {
  const container = document.getElementById('messages');
  const msgEl = document.createElement('div');
  msgEl.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  msgEl.appendChild(bubble);

  if (role === 'ai') {
    const audioContainer = document.createElement('div');
    msgEl.appendChild(audioContainer);
    const speakBtn = document.createElement('button');
    speakBtn.className = 'voice-btn';
    speakBtn.textContent = '🔊 朗读';
    speakBtn.onclick = () => generateAudio(text, audioContainer, speakBtn);
    audioContainer.appendChild(speakBtn);
  }

  container.appendChild(msgEl);
  container.scrollTop = container.scrollHeight;
}

async function generateAudio(text, container, btnElement) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-voice';
  loadingEl.textContent = '声音生成中…';
  if (btnElement) btnElement.style.display = 'none';
  container.appendChild(loadingEl);

  try {
    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
      method: 'POST',
      headers: { 'Accept': 'audio/mpeg', 'Content-Type': 'application/json', 'xi-api-key': elevenKey },
      body: JSON.stringify({ text, model_id: 'eleven_v3', voice_settings: { stability: 0.4, similarity_boost: 0.75, style: 0.0, use_speaker_boost: true } })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const arrayBuffer = await response.arrayBuffer();
    const uint8Array = new Uint8Array(arrayBuffer);
    let binary = '';
    for (let i = 0; i < uint8Array.length; i++) binary += String.fromCharCode(uint8Array[i]);
    const dataUrl = 'data:audio/mpeg;base64,' + btoa(binary);
    loadingEl.remove();

    // Build audio bar
    const bar = document.createElement('div');
    bar.className = 'audio-bar';
    bar.innerHTML = `
      <button class="audio-play-btn" id="pb-${Date.now()}">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="audio-waveform">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div>
      </div>
      <span class="audio-duration">--:--</span>
    `;
    container.appendChild(bar);

    const audio = new Audio(dataUrl);
    currentAudio = audio;
    const playBtn = bar.querySelector('.audio-play-btn');
    const durEl = bar.querySelector('.audio-duration');

    audio.onloadedmetadata = () => {
      const s = Math.round(audio.duration);
      durEl.textContent = `0:${s < 10 ? '0'+s : s}`;
    };
    audio.onplay = () => {
      bar.classList.add('playing');
      playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
      document.getElementById('header-orb').classList.add('speaking');
      document.getElementById('status-text').textContent = '正在说话…';
    };
    audio.onended = audio.onpause = () => {
      bar.classList.remove('playing');
      playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
      document.getElementById('header-orb').classList.remove('speaking');
      document.getElementById('status-text').textContent = '在线 · 随时都在';
    };
    playBtn.onclick = () => { if (audio.paused) audio.play(); else audio.pause(); };
    audio.play();

  } catch (err) {
    loadingEl.remove();
    if (btnElement) btnElement.style.display = 'inline-block';
    showToast('语音失败：' + err.message);
  }
}

function showTyping() {
  const container = document.getElementById('messages');
  const id = 'typing-' + Date.now();
  const msgEl = document.createElement('div');
  msgEl.className = 'message ai'; msgEl.id = id;
  msgEl.innerHTML = '<div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  container.appendChild(msgEl);
  container.scrollTop = container.scrollHeight;
  return id;
}

function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast'; toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
}
</script>
</body>
</html>
